<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Piano Sheet Reader</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #0e0e10; }
body { display: flex; flex-direction: column; font-family: 'Courier New', monospace; color: #f0ede6; }

#start-screen {
  position: fixed; inset: 0; background: #0e0e10;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 24px; z-index: 100;
}
#start-screen h1 { font-size: 32px; font-style: italic; color: #f0ede6; }
#start-screen p { font-size: 13px; color: #777; text-align: center; max-width: 340px; line-height: 1.9; }
.speed-control { display: flex; align-items: center; gap: 12px; font-size: 12px; color: #aaa; }
.speed-control input[type=range] { width: 150px; accent-color: #c8a96e; }
#start-btn {
  background: #c8a96e; color: #0e0e10; border: none; border-radius: 6px;
  padding: 13px 44px; font-family: inherit; font-size: 14px; font-weight: 600;
  cursor: pointer; letter-spacing: 0.06em; transition: opacity 0.15s;
}
#start-btn:hover { opacity: 0.82; }

#game-screen { display: none; flex-direction: column; width: 100%; height: 100vh; }

#hud {
  display: flex; align-items: center; gap: 14px;
  padding: 8px 18px; background: #161618;
  border-bottom: 0.5px solid #2a2a2e; font-size: 12px; flex-shrink: 0;
}
#hud .stat { color: #777; white-space: nowrap; }
#hud .stat span { color: #f0ede6; font-weight: 600; margin-left: 5px; }
#timer-bar-wrap { flex: 1; height: 4px; background: #2a2a2e; border-radius: 2px; overflow: hidden; }
#timer-bar { height: 100%; background: #c8a96e; border-radius: 2px; width: 100%; }
#menu-btn, #history-btn {
  background: transparent; color: #888; border: 0.5px solid #333;
  border-radius: 6px; padding: 6px 16px; font-family: inherit;
  font-size: 11px; cursor: pointer; transition: color 0.15s, border-color 0.15s;
}
#menu-btn:hover, #history-btn:hover { color: #f0ede6; border-color: #666; }

#main { display: flex; flex: 1; overflow: hidden; min-height: 0; }

#staff-panel {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: #0e0e10; position: relative; min-width: 0;
}
#feedback {
  position: absolute; top: 14px; right: 20px;
  font-size: 15px; font-weight: 600; opacity: 0; transition: opacity 0.2s;
}
#feedback.correct { color: #6fcf97; }
#feedback.wrong { color: #eb5757; }
#waiting-msg {
  position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
  font-size: 12px; color: #c8a96e; opacity: 0; transition: opacity 0.3s;
  white-space: nowrap; pointer-events: none;
}

/* History panel */
#history-panel {
  width: 210px; background: #111113; border-left: 0.5px solid #2a2a2e;
  display: flex; flex-direction: column; flex-shrink: 0;
  transition: width 0.25s; overflow: hidden;
}
#history-panel.collapsed { width: 0; }
#history-header {
  padding: 10px 14px; font-size: 11px; color: #555;
  border-bottom: 0.5px solid #2a2a2e; letter-spacing: 0.08em;
  display: flex; justify-content: space-between; align-items: center;
  flex-shrink: 0;
}
#clear-hist { color: #444; font-size: 10px; cursor: pointer; }
#clear-hist:hover { color: #aaa; }
#history-list { flex: 1; overflow-y: auto; padding: 4px 0; }
#history-list::-webkit-scrollbar { width: 3px; }
#history-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

.hist-item {
  padding: 6px 10px 8px;
  border-bottom: 0.5px solid #1a1a1c;
}
.hist-item-top {
  display: flex; align-items: center; gap: 6px;
  font-size: 10px; margin-bottom: 4px;
}
.hist-clef { font-size: 9px; color: #444; text-transform: uppercase; letter-spacing: 0.05em; }
.hist-count { margin-left: auto; font-size: 10px; color: #eb5757; white-space: nowrap; }

#stats-summary {
  padding: 10px 14px; border-top: 0.5px solid #2a2a2e;
  font-size: 10px; color: #555; line-height: 2; flex-shrink: 0;
}
#stats-summary b { color: #888; }

/* Piano */
#piano-area {
  background: #161618; border-top: 0.5px solid #2a2a2e;
  padding: 10px 0 12px; flex-shrink: 0;
}
#piano-label {
  font-size: 9px; color: #444; text-align: center;
  margin-bottom: 8px; letter-spacing: 0.1em;
}
#piano-wrap { width: 100%; overflow: hidden; display: flex; justify-content: center; }
#piano-inner { position: relative; }

.wk {
  background: #f0ece3; border: 0.5px solid #aaa;
  border-radius: 0 0 4px 4px; cursor: pointer; position: absolute;
  display: flex; align-items: flex-end; justify-content: center;
  padding-bottom: 4px; font-size: 0; color: #999;
  font-family: inherit; transition: background 0.07s;
}
.wk.show-label { font-size: 7px; }
.wk:hover { background: #e2ddd4; }
/* C3-B3 left hand zone */
.wk.lh { background: #c8c4bc; }
/* C4-B4 right hand zone */
.wk.rh { background: #c8c4bc; }
.wk.force { background: #a8d8a8 !important; animation: pg 0.5s infinite alternate; }
.wk.flash-good { background: #a8d8a8 !important; }
.wk.flash-bad { background: #f4a0a0 !important; }

.bk {
  background: #1a1a1a; border: 0.5px solid #000;
  border-radius: 0 0 3px 3px; cursor: pointer; position: absolute;
  top: 0; z-index: 2; transition: background 0.07s;
}
.bk:hover { background: #2e2e2e; }
/* black keys in hand zones slightly lighter */
.bk.lh { background: #3a3835; }
.bk.rh { background: #3a3835; }
.bk.force { background: #6fcf97 !important; animation: pg 0.5s infinite alternate; }
.bk.flash-good { background: #6fcf97 !important; }
.bk.flash-bad { background: #eb5757 !important; }

@keyframes pg { from{opacity:1} to{opacity:0.5} }
</style>
</head>
<body>

<div id="start-screen">
  <h1>Piano Sheet Reader</h1>
  <p>A note appears on the staff. Hit the matching key before time runs out.<br>Miss it and the key lights green — click it to continue.</p>
  <div class="speed-control">
    <span>time per note:</span>
    <input type="range" id="speed-slider" min="2" max="10" value="5" step="1">
    <span id="speed-label">5s</span>
  </div>
  <button id="start-btn">START</button>
</div>

<div id="game-screen">
  <div id="hud">
    <div class="stat">score<span id="score-val">0</span></div>
    <div class="stat">streak<span id="streak-val">0</span></div>
    <div id="timer-bar-wrap"><div id="timer-bar"></div></div>
    <button id="history-btn">missed notes</button>
    <button id="menu-btn">menu</button>
  </div>

  <div id="main">
    <div id="staff-panel">
      <div id="feedback"></div>
      <svg id="staff-svg" xmlns="http://www.w3.org/2000/svg"></svg>
      <div id="waiting-msg">▶ click the green key to continue</div>
    </div>
    <div id="history-panel">
      <div id="history-header">
        MISSED NOTES
        <span id="clear-hist">clear</span>
      </div>
      <div id="history-list"></div>
      <div id="stats-summary"></div>
    </div>
  </div>

  <div id="piano-area">
    <div id="piano-label">C3–B3 = LEFT HAND &nbsp;·&nbsp; C4–B4 = RIGHT HAND</div>
    <div id="piano-wrap"><div id="piano-inner"></div></div>
  </div>
</div>

<script>
const NOTE_NAMES=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
function midiName(m){return NOTE_NAMES[m%12]+(Math.floor(m/12)-1);}
function isWhite(m){return[0,2,4,5,7,9,11].includes(m%12);}

const ALL_MIDI=[];
for(let m=21;m<=108;m++) ALL_MIDI.push(m);
const WHITE_MIDI=ALL_MIDI.filter(m=>isWhite(m));
const BLACK_MIDI=ALL_MIDI.filter(m=>!isWhite(m));

// C3=48 to B4=71 greyed out (both hand zones)
const GREY_LO=48, GREY_HI=71;
const LH_LO=48,LH_HI=59,RH_LO=60,RH_HI=71;

const S2D=[0,null,1,null,2,3,null,4,null,5,null,6];
function diat(midi){const o=Math.floor(midi/12)-1;const d=S2D[midi%12];return o*7+(d===null?0:d);}
function staffPos(midi,clef){return diat(midi)-(clef==='treble'?diat(64):diat(43));}

const QUIZ_NOTES=[];
for(let m=60;m<=79;m++) if(isWhite(m)) QUIZ_NOTES.push({midi:m,clef:'treble',pos:staffPos(m,'treble')});
for(let m=36;m<=60;m++) if(isWhite(m)) QUIZ_NOTES.push({midi:m,clef:'bass',pos:staffPos(m,'bass')});

let score=0,streak=0,currentNote=null,timerId=null,noteDuration=5000;
let waitingForForced=false;
let missedMap={},missedLog=[];

const timerBar=document.getElementById('timer-bar');

// ── Piano ──────────────────────────────────────────────
function buildPiano(){
  const totalW=window.innerWidth;
  const ww=Math.max(11,Math.floor((totalW-4)/WHITE_MIDI.length)-1);
  const wh=Math.min(110,Math.max(65,Math.floor(window.innerHeight*0.17)));
  const bw=Math.max(7,Math.floor(ww*0.58));
  const bh=Math.floor(wh*0.62);

  const inner=document.getElementById('piano-inner');
  inner.innerHTML='';
  inner.style.width=(WHITE_MIDI.length*(ww+1))+'px';
  inner.style.height=wh+'px';

  const wx={};
  WHITE_MIDI.forEach((m,i)=>{
    const x=i*(ww+1); wx[m]=x;
    const k=document.createElement('div');
    k.className='wk'; k.dataset.midi=m;
    k.style.left=x+'px'; k.style.width=ww+'px'; k.style.height=wh+'px';
    if(m>=LH_LO&&m<=LH_HI) k.classList.add('lh');
    if(m>=RH_LO&&m<=RH_HI) k.classList.add('rh');
    const nm=midiName(m);
    if(nm.startsWith('C')){k.classList.add('show-label');k.textContent=nm;}
    k.addEventListener('mousedown',e=>{e.preventDefault();handleKey(m);});
    inner.appendChild(k);
  });

  BLACK_MIDI.forEach(m=>{
    const lx=wx[m-1]; if(lx===undefined) return;
    const k=document.createElement('div');
    k.className='bk'; k.dataset.midi=m;
    k.style.left=(lx+ww+1-Math.floor(bw/2)-1)+'px';
    k.style.width=bw+'px'; k.style.height=bh+'px';
    if(m>=LH_LO&&m<=LH_HI) k.classList.add('lh');
    if(m>=RH_LO&&m<=RH_HI) k.classList.add('rh');
    k.addEventListener('mousedown',e=>{e.preventDefault();handleKey(m);});
    inner.appendChild(k);
  });
}

function forceKey(midi){
  clearForceKeys();
  const k=document.querySelector(`[data-midi="${midi}"]`);
  if(k) k.classList.add('force');
}
function clearForceKeys(){document.querySelectorAll('.force').forEach(k=>k.classList.remove('force'));}
function flashKey(midi,cls){
  const k=document.querySelector(`[data-midi="${midi}"]`);
  if(!k) return;
  k.classList.add(cls);
  setTimeout(()=>k.classList.remove(cls),400);
}

// ── Main staff drawing (full grand staff) ───────────────
function drawStaff(note){
  const svgEl=document.getElementById('staff-svg');
  const panel=document.getElementById('staff-panel');
  const W=Math.min(panel.clientWidth-40,560);
  const H=200;
  svgEl.setAttribute('width',W);
  svgEl.setAttribute('height',H);
  svgEl.setAttribute('viewBox',`0 0 ${W} ${H}`);
  svgEl.innerHTML='';

  const tTop=18,bTop=108,gap=10;
  function lineY(top,i){return top+(4-i)*gap;}

  function drawLines(top){
    for(let i=0;i<5;i++){
      const l=document.createElementNS('http://www.w3.org/2000/svg','line');
      l.setAttribute('x1','50');l.setAttribute('x2',String(W-20));
      l.setAttribute('y1',String(lineY(top,i)));l.setAttribute('y2',String(lineY(top,i)));
      l.setAttribute('stroke','#4a4a4a');l.setAttribute('stroke-width','1');
      svgEl.appendChild(l);
    }
  }
  drawLines(tTop);drawLines(bTop);

  const bar=document.createElementNS('http://www.w3.org/2000/svg','line');
  bar.setAttribute('x1','50');bar.setAttribute('x2','50');
  bar.setAttribute('y1',String(tTop));bar.setAttribute('y2',String(bTop+4*gap));
  bar.setAttribute('stroke','#4a4a4a');bar.setAttribute('stroke-width','1.5');
  svgEl.appendChild(bar);

  function tx(x,y,t,sz,fill){
    const el=document.createElementNS('http://www.w3.org/2000/svg','text');
    el.setAttribute('x',String(x));el.setAttribute('y',String(y));
    el.setAttribute('fill',fill||'#888');el.setAttribute('font-size',String(sz));
    el.setAttribute('font-family','serif');el.textContent=t;
    svgEl.appendChild(el);
  }
  tx(20,tTop+40,'𝄞',44);
  tx(22,bTop+24,'𝄢',28);

  const isBass=note.clef==='bass';
  const sTop=isBass?bTop:tTop;

  const hl=document.createElementNS('http://www.w3.org/2000/svg','rect');
  hl.setAttribute('x','50');hl.setAttribute('y',String(sTop-3));
  hl.setAttribute('width',String(W-70));hl.setAttribute('height',String(4*gap+6));
  hl.setAttribute('fill',isBass?'#1a1828':'#162018');
  hl.setAttribute('rx','3');hl.setAttribute('opacity','0.5');
  svgEl.insertBefore(hl,svgEl.firstChild);

  placeNote(svgEl,note,sTop,W/2,gap,6,4,true);
}

// ── Mini staff (single clef only) ──────────────────────
function makeMiniStaff(note){
  const W=180,H=52,gap=7;
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('width',W);svg.setAttribute('height',H);
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  svg.style.display='block';

  // only one clef, centered vertically
  const sTop=6;
  function lineY(i){return sTop+(4-i)*gap;}

  // staff lines
  for(let i=0;i<5;i++){
    const l=document.createElementNS('http://www.w3.org/2000/svg','line');
    l.setAttribute('x1','22');l.setAttribute('x2',String(W-6));
    l.setAttribute('y1',String(lineY(i)));l.setAttribute('y2',String(lineY(i)));
    l.setAttribute('stroke','#4a4a4a');l.setAttribute('stroke-width','0.8');
    svg.appendChild(l);
  }

  // left bar
  const bar=document.createElementNS('http://www.w3.org/2000/svg','line');
  bar.setAttribute('x1','22');bar.setAttribute('x2','22');
  bar.setAttribute('y1',String(sTop));bar.setAttribute('y2',String(sTop+4*gap));
  bar.setAttribute('stroke','#4a4a4a');bar.setAttribute('stroke-width','1');
  svg.appendChild(bar);

  // clef symbol
  const clefEl=document.createElementNS('http://www.w3.org/2000/svg','text');
  clefEl.setAttribute('font-family','serif');
  clefEl.setAttribute('fill','#666');
  if(note.clef==='treble'){
    clefEl.setAttribute('x','4');clefEl.setAttribute('y',String(sTop+32));
    clefEl.setAttribute('font-size','28');clefEl.textContent='𝄞';
  } else {
    clefEl.setAttribute('x','5');clefEl.setAttribute('y',String(sTop+16));
    clefEl.setAttribute('font-size','18');clefEl.textContent='𝄢';
  }
  svg.appendChild(clefEl);

  placeNote(svg,note,sTop,W*0.58,gap,4,3,false);
  return svg;
}

// ── Shared note placement ───────────────────────────────
function placeNote(svgEl,note,sTop,noteX,gap,rx,ry,showLabel){
  function lineY(i){return sTop+(4-i)*gap;}
  const botY=lineY(0);
  const noteY=botY-note.pos*(gap/2);

  // ledger lines below
  if(note.pos<0){
    for(let p=-2;p>=note.pos;p-=2){
      const ly=botY-p*(gap/2);
      const l=document.createElementNS('http://www.w3.org/2000/svg','line');
      l.setAttribute('x1',String(noteX-rx-4));l.setAttribute('x2',String(noteX+rx+4));
      l.setAttribute('y1',String(ly));l.setAttribute('y2',String(ly));
      l.setAttribute('stroke','#c8a96e');l.setAttribute('stroke-width','1');
      svgEl.appendChild(l);
    }
  }
  // ledger lines above
  if(note.pos>8){
    for(let p=10;p<=note.pos;p+=2){
      const ly=botY-p*(gap/2);
      const l=document.createElementNS('http://www.w3.org/2000/svg','line');
      l.setAttribute('x1',String(noteX-rx-4));l.setAttribute('x2',String(noteX+rx+4));
      l.setAttribute('y1',String(ly));l.setAttribute('y2',String(ly));
      l.setAttribute('stroke','#c8a96e');l.setAttribute('stroke-width','1');
      svgEl.appendChild(l);
    }
  }

  const el=document.createElementNS('http://www.w3.org/2000/svg','ellipse');
  el.setAttribute('cx',String(noteX));el.setAttribute('cy',String(noteY));
  el.setAttribute('rx',String(rx));el.setAttribute('ry',String(ry));
  el.setAttribute('fill','#c8a96e');
  el.setAttribute('transform',`rotate(-12,${noteX},${noteY})`);
  svgEl.appendChild(el);

  const up=note.pos<4;
  const sx=noteX+(up?rx-1:-(rx-1));
  const stemLen=gap*2.8;
  const stem=document.createElementNS('http://www.w3.org/2000/svg','line');
  stem.setAttribute('x1',String(sx));stem.setAttribute('x2',String(sx));
  stem.setAttribute('y1',String(noteY));stem.setAttribute('y2',String(up?noteY-stemLen:noteY+stemLen));
  stem.setAttribute('stroke','#c8a96e');stem.setAttribute('stroke-width','1.2');
  svgEl.appendChild(stem);

  if(showLabel){
    const lbl=document.createElementNS('http://www.w3.org/2000/svg','text');
    lbl.setAttribute('x',String(noteX+rx+8));lbl.setAttribute('y',String(noteY+4));
    lbl.setAttribute('fill','#555');lbl.setAttribute('font-size','10');
    lbl.setAttribute('font-family','monospace');lbl.textContent=midiName(note.midi);
    svgEl.appendChild(lbl);
  }
}

// ── Timer ───────────────────────────────────────────────
function startTimer(){
  clearTimeout(timerId);
  timerBar.style.transition='none';
  timerBar.style.width='100%';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    timerBar.style.transition=`width ${noteDuration}ms linear`;
    timerBar.style.width='0%';
  }));
  timerId=setTimeout(()=>{
    waitingForForced=true;
    streak=0;
    document.getElementById('streak-val').textContent=streak;
    showFeedback('time — click the green key!','wrong');
    document.getElementById('waiting-msg').style.opacity='1';
    forceKey(currentNote.midi);
    timerBar.style.transition='none';
    timerBar.style.width='0%';
    recordMissed(currentNote);
  },noteDuration);
}

function nextNote(){
  waitingForForced=false;
  clearForceKeys();
  document.getElementById('waiting-msg').style.opacity='0';
  currentNote=QUIZ_NOTES[Math.floor(Math.random()*QUIZ_NOTES.length)];
  drawStaff(currentNote);
  startTimer();
}

// ── Missed history ──────────────────────────────────────
function recordMissed(note){
  const key=note.midi+'_'+note.clef;
  if(!missedMap[key]){
    missedMap[key]={note,count:0};
    missedLog.unshift(key);
  } else {
    missedLog=missedLog.filter(k=>k!==key);
    missedLog.unshift(key);
  }
  missedMap[key].count++;
  renderHistory();
}

function renderHistory(){
  const list=document.getElementById('history-list');
  list.innerHTML='';

  if(missedLog.length===0){
    const empty=document.createElement('div');
    empty.style.cssText='padding:16px 14px;font-size:11px;color:#444;';
    empty.textContent='no misses yet!';
    list.appendChild(empty);
  } else {
    missedLog.forEach(key=>{
      const {note,count}=missedMap[key];
      const item=document.createElement('div');
      item.className='hist-item';

      const top=document.createElement('div');
      top.className='hist-item-top';
      const clefSpan=document.createElement('span');
      clefSpan.className='hist-clef';
      clefSpan.textContent=note.clef+' clef';
      const cntSpan=document.createElement('span');
      cntSpan.className='hist-count';
      cntSpan.textContent='×'+count;
      top.appendChild(clefSpan);
      top.appendChild(cntSpan);

      item.appendChild(top);
      item.appendChild(makeMiniStaff(note));
      list.appendChild(item);
    });
  }

  const noteStats={};
  missedLog.forEach(key=>{
    const {note,count}=missedMap[key];
    const nm=midiName(note.midi);
    if(!noteStats[nm]) noteStats[nm]=0;
    noteStats[nm]+=count;
  });
  const sorted=Object.entries(noteStats).sort((a,b)=>b[1]-a[1]);
  const worst=sorted.slice(0,4).map(([k,v])=>`${k}(×${v})`).join('  ');
  document.getElementById('stats-summary').innerHTML=
    `<b>total missed:</b> ${missedLog.length}<br><b>work on:</b> ${worst||'—'}`;
}

// ── Key handler ─────────────────────────────────────────
function handleKey(midi){
  if(!currentNote) return;
  if(waitingForForced){
    if(midi===currentNote.midi){
      clearForceKeys();
      flashKey(midi,'flash-good');
      document.getElementById('waiting-msg').style.opacity='0';
      setTimeout(nextNote,300);
    }
    return;
  }
  if(midi===currentNote.midi){
    score+=10+streak*2; streak++;
    document.getElementById('score-val').textContent=score;
    document.getElementById('streak-val').textContent=streak;
    showFeedback('✓ correct','correct');
    flashKey(midi,'flash-good');
    clearTimeout(timerId);
    timerBar.style.transition='none';
    timerBar.style.width='100%';
    setTimeout(nextNote,350);
  } else {
    streak=0;
    document.getElementById('streak-val').textContent=streak;
    showFeedback('✗ wrong','wrong');
    flashKey(midi,'flash-bad');
  }
}

function showFeedback(msg,type){
  const el=document.getElementById('feedback');
  el.textContent=msg;el.className=type;el.style.opacity='1';
  setTimeout(()=>{el.style.opacity='0';},900);
}

// ── UI wiring ───────────────────────────────────────────
document.getElementById('speed-slider').addEventListener('input',function(){
  document.getElementById('speed-label').textContent=this.value+'s';
  noteDuration=parseInt(this.value)*1000;
});

document.getElementById('start-btn').addEventListener('click',()=>{
  document.getElementById('start-screen').style.display='none';
  const gs=document.getElementById('game-screen');
  gs.style.display='flex';
  buildPiano();
  renderHistory();
  nextNote();
});

document.getElementById('menu-btn').addEventListener('click',()=>{
  clearTimeout(timerId);
  currentNote=null;waitingForForced=false;
  score=0;streak=0;
  document.getElementById('score-val').textContent='0';
  document.getElementById('streak-val').textContent='0';
  document.getElementById('game-screen').style.display='none';
  document.getElementById('start-screen').style.display='flex';
});

document.getElementById('history-btn').addEventListener('click',()=>{
  document.getElementById('history-panel').classList.toggle('collapsed');
});

document.getElementById('clear-hist').addEventListener('click',()=>{
  missedMap={};missedLog=[];renderHistory();
});

window.addEventListener('resize',()=>{
  buildPiano();
  if(currentNote) drawStaff(currentNote);
});

document.getElementById('history-panel').classList.add('collapsed');
</script>
</body>
</html>
